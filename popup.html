<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrantoList Quick Save</title>
    <script src="theme-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            --ll-popup-bg: var(--ll-popup-bg-surface, linear-gradient(135deg, rgba(33, 37, 49, 0.95), rgba(33, 37, 49, 0.85)));
            --ll-popup-text: var(--ll-board-text-color, #ffffff);
            --ll-popup-text-secondary: var(--ll-link-description-color, #8a9aaa);
            --ll-popup-text-muted: color-mix(in srgb, var(--ll-link-description-color, #8a9aaa) 82%, transparent);
            --ll-popup-surface-1: rgba(41, 46, 61, 0.4);
            --ll-popup-surface-2: rgba(41, 46, 61, 0.5);
            --ll-popup-surface-3: rgba(41, 46, 61, 0.6);
            --ll-popup-surface-hover: rgba(255, 255, 255, 0.1);
            --ll-popup-border-soft: rgba(255, 255, 255, 0.1);
            --ll-popup-border-muted: rgba(255, 255, 255, 0.08);
            --ll-popup-accent: var(--ll-accent-1, #00ff88);
            --ll-popup-accent-2: var(--ll-accent-2, #00dd77);
            --ll-popup-accent-soft: var(--ll-accent-soft, rgba(0, 255, 136, 0.25));
            --ll-popup-accent-text: var(--ll-active-text-color, #1f2c36);
            --ll-popup-info: #5b7cfa;
            --ll-popup-danger: #ff6b7a;
            --ll-popup-warning-soft: rgba(255, 193, 7, 0.1);
            --ll-popup-warning-border: rgba(255, 193, 7, 0.2);
            --ll-popup-kbd-text: #dce8f3;
            --ll-popup-btn-surface: rgba(91, 124, 250, 0.2);
            --ll-popup-btn-surface-hover: rgba(91, 124, 250, 0.3);
            --ll-popup-btn-border: rgba(91, 124, 250, 0.35);
            --ll-popup-btn-border-hover: rgba(91, 124, 250, 0.5);
            --ll-popup-save-all: var(--ll-accent-1, #afe479);
            --ll-popup-spinner: var(--ll-active-text-color, #1f2c36);
            --ll-popup-accent-shadow-sm: rgba(var(--ll-accent-rgb, 0, 255, 136), 0.22);
            --ll-popup-accent-shadow-md: rgba(var(--ll-accent-rgb, 0, 255, 136), 0.32);
            --ll-popup-save-shadow-sm: rgba(var(--ll-accent-rgb, 175, 228, 121), 0.31);
            --ll-popup-save-shadow-lg: rgba(var(--ll-accent-rgb, 175, 228, 121), 0.45);
            --ll-popup-accent-glow: rgba(var(--ll-accent-rgb, 0, 255, 136), 0.4);
            --ll-popup-danger-glow: rgba(255, 107, 122, 0.4);
            --ll-popup-info-glow: rgba(91, 124, 250, 0.4);
            --ll-popup-select-option-bg: #2c3342;
        }

        :root[data-theme="light"] {
            --ll-popup-bg: var(--ll-popup-bg-surface, linear-gradient(135deg, rgba(248, 251, 255, 0.98), rgba(236, 243, 252, 0.96)));
            --ll-popup-text: var(--ll-board-text-color, #182130);
            --ll-popup-text-secondary: var(--ll-link-description-color, #4f647e);
            --ll-popup-text-muted: color-mix(in srgb, var(--ll-link-description-color, #687f98) 82%, transparent);
            --ll-popup-surface-1: rgba(255, 255, 255, 0.9);
            --ll-popup-surface-2: rgba(255, 255, 255, 0.95);
            --ll-popup-surface-3: rgba(255, 255, 255, 0.96);
            --ll-popup-surface-hover: rgba(15, 23, 42, 0.09);
            --ll-popup-border-soft: rgba(15, 23, 42, 0.14);
            --ll-popup-border-muted: rgba(15, 23, 42, 0.1);
            --ll-popup-accent: var(--ll-accent-1, #00b868);
            --ll-popup-accent-2: var(--ll-accent-2, #00a95f);
            --ll-popup-accent-soft: var(--ll-accent-soft, rgba(0, 184, 104, 0.2));
            --ll-popup-accent-text: var(--ll-active-text-color, #f4fbf8);
            --ll-popup-info: #2f66d9;
            --ll-popup-danger: #cc425d;
            --ll-popup-warning-soft: rgba(177, 120, 6, 0.15);
            --ll-popup-warning-border: rgba(177, 120, 6, 0.25);
            --ll-popup-kbd-text: #31465f;
            --ll-popup-btn-surface: rgba(47, 102, 217, 0.16);
            --ll-popup-btn-surface-hover: rgba(47, 102, 217, 0.24);
            --ll-popup-btn-border: rgba(47, 102, 217, 0.35);
            --ll-popup-btn-border-hover: rgba(47, 102, 217, 0.45);
            --ll-popup-save-all: var(--ll-accent-1, #8ecf53);
            --ll-popup-spinner: var(--ll-active-text-color, #31465f);
            --ll-popup-accent-shadow-sm: rgba(var(--ll-accent-rgb, 0, 184, 104), 0.22);
            --ll-popup-accent-shadow-md: rgba(var(--ll-accent-rgb, 0, 184, 104), 0.32);
            --ll-popup-save-shadow-sm: rgba(var(--ll-accent-rgb, 142, 207, 83), 0.28);
            --ll-popup-save-shadow-lg: rgba(var(--ll-accent-rgb, 142, 207, 83), 0.45);
            --ll-popup-accent-glow: rgba(var(--ll-accent-rgb, 0, 184, 104), 0.32);
            --ll-popup-danger-glow: rgba(204, 66, 93, 0.32);
            --ll-popup-info-glow: rgba(47, 102, 217, 0.32);
            --ll-popup-select-option-bg: #ffffff;
        }

        :root {
            color-scheme: dark;
        }

        :root[data-theme="light"] {
            color-scheme: light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 300px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--ll-popup-bg);
            backdrop-filter: blur(20px) saturate(120%);
            -webkit-backdrop-filter: blur(20px) saturate(120%);
            color: var(--ll-popup-text);
            padding: 20px;
        }

        button,
        input,
        select,
        textarea {
            font-family: inherit;
            font-synthesis-weight: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            padding: 10px 12px;
            background: var(--ll-popup-surface-1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--ll-popup-border-muted);
            border-radius: 10px;
        }


        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        .page-info {
            background: var(--ll-popup-surface-2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--ll-popup-border-soft);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .page-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--ll-popup-text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .page-url {
            font-size: 11px;
            color: var(--ll-popup-text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .save-btn {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--ll-popup-accent) 0%, var(--ll-popup-accent-2) 100%);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--ll-border-accent, var(--ll-popup-border-soft));
            border-radius: 10px;
            color: var(--ll-popup-accent-text);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px var(--ll-popup-accent-shadow-sm);
        }

        .save-btn:hover {
            background: linear-gradient(135deg, var(--ll-accent-hover, var(--ll-popup-accent)) 0%, var(--ll-popup-accent) 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--ll-popup-accent-shadow-md);
        }

        .save-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .save-btn.saving {
            background: var(--ll-popup-surface-3);
            box-shadow: none;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
            display: block;
            flex-shrink: 0;
        }

        .btn-icon-slot {
            width: 18px;
            height: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .btn-label {
            display: inline-flex;
            align-items: center;
        }

        /* States */
        .state {
            display: none;
            text-align: center;
        }

        .state.active {
            display: block;
        }

        .state-icon-container {
            margin-bottom: 12px;
        }

        .state-icon {
            width: 48px;
            height: 48px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .message {
            font-size: 13px;
            color: var(--ll-popup-text-secondary);
        }

        .page-name {
            font-size: 12px;
            color: var(--ll-popup-accent);
            font-weight: 500;
            margin-top: 4px;
        }

        .success .state-icon {
            color: var(--ll-popup-accent);
        }

        .error .state-icon {
            color: var(--ll-popup-danger);
        }

        .divider {
            height: 1px;
            background: var(--ll-popup-surface-hover);
            margin: 12px 0;
        }

        .save-all-btn {
            background: linear-gradient(135deg, var(--ll-popup-save-all) 0%, var(--ll-popup-accent-2) 100%);
            border-color: var(--ll-border-accent, var(--ll-popup-border-soft));
            color: var(--ll-popup-accent-text);
            box-shadow: 0 6px 18px var(--ll-popup-save-shadow-sm);
            justify-content: flex-start;
            gap: 10px;
        }

        .save-all-btn:hover {
            box-shadow: 0 6px 18px var(--ll-popup-save-shadow-lg)
        }

        .save-all-btn .btn-label {
            flex: 1 1 auto;
            justify-content: flex-start;
        }

        .tab-count {
            background: none;
            padding: 0;
            border-radius: 0;
            font-size: 14px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin-left: auto;
            color: inherit;
            line-height: 1;
        }

        /* Save All Success State */
        .save-all-success .state-icon {
            color: var(--ll-popup-info);
        }

        .saved-count {
            font-size: 24px;
            font-weight: 700;
            color: var(--ll-popup-info);
            margin-bottom: 4px;
        }

        /* Settings Section */
        .settings-section {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--ll-popup-border-soft);
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .setting-row+.setting-row {
            margin-top: 10px;
        }

        .setting-label {
            font-size: 11px;
            color: var(--ll-popup-text-secondary);
        }

        .setting-select {
            flex: 1;
            max-width: 140px;
            padding: 6px 8px;
            font-size: 11px;
            background: var(--ll-popup-surface-3);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--ll-popup-border-soft);
            border-radius: 8px;
            color: var(--ll-popup-text);
            cursor: pointer;
            color-scheme: dark;
        }

        .setting-select option {
            background-color: var(--ll-popup-select-option-bg);
            color: var(--ll-popup-text);
        }

        :root[data-theme="light"] .setting-select {
            color-scheme: light;
        }

        .setting-select:focus {
            outline: none;
            border-color: var(--ll-popup-accent);
        }

        .shortcut-setting {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .setting-kbd {
            background: var(--ll-popup-surface-3);
            border: 1px solid var(--ll-popup-border-soft);
            padding: 3px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 11px;
            color: var(--ll-popup-kbd-text);
            min-width: 66px;
            text-align: center;
        }

        .setting-btn {
            padding: 6px 10px;
            font-size: 11px;
            font-weight: 600;
            color: var(--ll-popup-kbd-text);
            background: var(--ll-popup-btn-surface);
            border: 1px solid var(--ll-popup-btn-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .setting-btn:hover {
            background: var(--ll-popup-btn-surface-hover);
            border-color: var(--ll-popup-btn-border-hover);
        }

        .setting-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .setting-note {
            margin-top: 8px;
            font-size: 10px;
            color: var(--ll-popup-text-muted);
            text-align: right;
            line-height: 1.4;
        }

        /* Sync Status Banner */
        .sync-banner {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            margin: -20px -20px 16px -20px;
            background: var(--ll-popup-warning-soft);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--ll-popup-warning-border);
            font-size: 12px;
        }

        .sync-banner.visible {
            display: flex;
        }

        .sync-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .sync-text {
            color: var(--ll-popup-text);
            flex: 1;
        }

        .sign-in-link {
            color: var(--ll-popup-accent);
            text-decoration: none;
            font-weight: 500;
            white-space: nowrap;
        }

        .sign-in-link:hover {
            text-decoration: underline;
        }

        /* Loading Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            display: block;
            border: 2px solid var(--ll-popup-border-soft);
            border-top-color: var(--ll-popup-spinner);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* State backgrounds with glass effect */
        .state.success,
        .state.error,
        .state.save-all-success {
            padding: 20px;
            background: var(--ll-popup-surface-1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--ll-popup-border-muted);
            border-radius: 12px;
        }

        .success .state-icon-container svg {
            filter: drop-shadow(0 0 8px var(--ll-popup-accent-glow));
        }

        .error .state-icon-container svg {
            filter: drop-shadow(0 0 8px var(--ll-popup-danger-glow));
        }

        .save-all-success .state-icon-container svg {
            filter: drop-shadow(0 0 8px var(--ll-popup-info-glow));
        }
    </style>
</head>

<body>
    <!-- Login Required Banner -->
    <div class="sync-banner" id="syncBanner">
        <svg class="sync-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        <span class="sync-text">Please login to save bookmarks</span>
        <a href="#" id="signInLink" class="sign-in-link">Sign in</a>
    </div>

    <!-- Initial State - Show save button -->
    <div id="initialState" class="state active">
        <div class="header">
            <span class="header-title">Save to PrantoList</span>
        </div>

        <div class="page-info">
            <div class="page-title" id="pageTitle">Loading...</div>
            <div class="page-url" id="pageUrl"></div>
        </div>

        <button class="save-btn" id="saveBtn">
            <span class="btn-icon-slot" id="saveBtnIcon" aria-hidden="true">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    <line x1="12" y1="7" x2="12" y2="13"></line>
                    <line x1="9" y1="10" x2="15" y2="10"></line>
                </svg>
            </span>
            <span class="btn-label" id="saveBtnLabel">Save to Bookmarks</span>
        </button>

        <div class="divider"></div>

        <button class="save-btn save-all-btn" id="saveAllBtn">
            <span class="btn-icon-slot" id="saveAllBtnIcon" aria-hidden="true">
                <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                </svg>
            </span>
            <span class="btn-label" id="saveAllBtnLabel">Save All Tabs</span>
            <span class="tab-count" id="tabCount"></span>
        </button>

        <div class="settings-section">
            <div class="setting-row">
                <span class="setting-label">Save to page:</span>
                <select id="quickSavePage" class="setting-select">
                    <option value="">Select page</option>
                </select>
            </div>
            <div class="setting-row" id="boardSettingRow" style="display: none;">
                <span class="setting-label">Save to board:</span>
                <select id="quickSaveBoard" class="setting-select">
                    <option value="">Select board</option>
                </select>
            </div>
            <div class="setting-row">
                <span class="setting-label">Shortcut:</span>
                <div class="shortcut-setting">
                    <kbd class="setting-kbd" id="quickSaveShortcutValue">Loading...</kbd>
                    <button type="button" class="setting-btn" id="changeShortcutBtn">Change</button>
                </div>
            </div>
            <div class="setting-note" id="shortcutSettingNote">Manage shortcut in browser settings.</div>
        </div>
    </div>

    <!-- Success State -->
    <div id="successState" class="state success">
        <div class="state-icon-container">
            <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="9 12 12 15 16 10"></polyline>
            </svg>
        </div>
        <div class="title">Saved!</div>
        <div class="message">Added to selected board on</div>
        <div class="page-name" id="pageName"></div>
    </div>

    <!-- Already Saved State -->
    <div id="alreadyState" class="state success">
        <div class="state-icon-container">
            <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="9 12 12 15 16 10"></polyline>
            </svg>
        </div>
        <div class="title">Already Saved</div>
        <div class="message">This page is already in your bookmarks</div>
    </div>

    <!-- Save All Success State -->
    <div id="saveAllSuccessState" class="state save-all-success">
        <div class="state-icon-container">
            <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
            </svg>
        </div>
        <div class="saved-count" id="savedTabCount">0</div>
        <div class="title">Tabs Saved!</div>
        <div class="message">Added to selected page on</div>
        <div class="page-name" id="saveAllPageName"></div>
    </div>

    <!-- Error State -->
    <div id="errorState" class="state error">
        <div class="state-icon-container">
            <svg class="state-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        </div>
        <div class="title">Cannot Save</div>
        <div class="message" id="errorMessage"></div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
