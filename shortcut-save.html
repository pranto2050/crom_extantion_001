<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save to Board</title>
    <script src="theme-bootstrap.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        :root {
            color-scheme: dark;
            --shortcut-bg: radial-gradient(circle at 0% 0%, rgba(0, 255, 136, 0.18) 0%, rgba(0, 255, 136, 0) 45%), linear-gradient(135deg, rgba(26, 30, 41, 0.95), rgba(33, 37, 49, 0.93));
            --shortcut-panel: rgba(26, 30, 41, 0.52);
            --shortcut-panel-border: rgba(255, 255, 255, 0.12);
            --shortcut-text: #f6fbff;
            --shortcut-muted: rgba(214, 224, 236, 0.7);
            --shortcut-accent: var(--ll-accent-1, #00ff88);
            --shortcut-accent-soft: rgba(0, 255, 136, 0.25);
            --shortcut-danger: #ff6f7b;
        }

        :root[data-theme="light"] {
            color-scheme: light;
            --shortcut-bg: radial-gradient(circle at 0% 0%, rgba(0, 184, 104, 0.2) 0%, rgba(0, 184, 104, 0) 45%), linear-gradient(135deg, rgba(245, 250, 255, 0.97), rgba(234, 242, 252, 0.95));
            --shortcut-panel: rgba(255, 255, 255, 0.84);
            --shortcut-panel-border: rgba(15, 23, 42, 0.14);
            --shortcut-text: #172132;
            --shortcut-muted: rgba(39, 58, 82, 0.72);
            --shortcut-accent: var(--ll-accent-1, #00b868);
            --shortcut-accent-soft: rgba(0, 184, 104, 0.2);
            --shortcut-danger: #d4475d;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: var(--shortcut-text);
            background: var(--shortcut-bg);
            padding: 18px;
            display: grid;
            place-items: center;
        }

        .shell {
            width: min(100%, 560px);
            border: 1px solid var(--shortcut-panel-border);
            background: var(--shortcut-panel);
            backdrop-filter: blur(22px) saturate(140%);
            -webkit-backdrop-filter: blur(22px) saturate(140%);
            border-radius: 18px;
            box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
            overflow: hidden;
        }

        .header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--shortcut-panel-border);
        }

        .title {
            margin: 0;
            font-size: 17px;
            letter-spacing: 0.2px;
        }

        .subtitle {
            margin: 6px 0 0;
            font-size: 12px;
            color: var(--shortcut-muted);
        }

        .content {
            padding: 16px 20px 20px;
            display: grid;
            gap: 14px;
        }

        .tab-card {
            border: 1px solid var(--shortcut-panel-border);
            border-radius: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab-title {
            font-size: 13px;
            font-weight: 600;
            margin: 0 0 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-url {
            font-size: 11px;
            color: var(--shortcut-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--shortcut-muted);
            font-weight: 600;
        }

        select {
            width: 100%;
            border: 1px solid var(--shortcut-panel-border);
            background: rgba(0, 0, 0, 0.2);
            color: var(--shortcut-text);
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 13px;
            outline: none;
        }

        :root[data-theme="light"] select {
            background: rgba(255, 255, 255, 0.92);
        }

        .status {
            min-height: 18px;
            font-size: 12px;
            color: var(--shortcut-muted);
        }

        .status.error {
            color: var(--shortcut-danger);
        }

        .status.success {
            color: var(--shortcut-accent);
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 11px 14px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.07);
            color: var(--shortcut-text);
            flex: 0 0 auto;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--shortcut-accent), color-mix(in srgb, var(--shortcut-accent) 82%, #004020));
            color: color-mix(in srgb, var(--shortcut-text) 18%, #00170b);
            box-shadow: 0 8px 20px var(--shortcut-accent-soft);
            flex: 1 1 auto;
        }

        .btn-save:not(:disabled):hover {
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <main class="shell" aria-live="polite">
        <header class="header">
            <h1 class="title">Save Current Website</h1>
            <p class="subtitle">Pick a board, then save this tab.</p>
        </header>
        <section class="content">
            <div class="tab-card">
                <p class="tab-title" id="tabTitle">Loading tab...</p>
                <p class="tab-url" id="tabUrl"></p>
            </div>

            <div class="field">
                <label for="boardSelect">Board Name</label>
                <select id="boardSelect" disabled>
                    <option value="">Loading boards...</option>
                </select>
            </div>

            <p class="status" id="statusText"></p>

            <div class="actions">
                <button type="button" class="btn-cancel" id="cancelBtn">Cancel</button>
                <button type="button" class="btn-save" id="saveBtn" disabled>Save to Selected Board</button>
            </div>
        </section>
    </main>

    <script src="shortcut-save.js"></script>
</body>

</html>
